name: Monitor Diario Oficial

on:
  schedule:
    - cron: "0 11,23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-diario-oficial
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dotenv pypdf

      - name: Run monitor
        run: python monitor.py

      - name: Commit logs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registro ultimo_status.txt
          if git diff --cached --quiet; then
            echo "No log changes to commit."
            exit 0
          fi
          git commit -m "chore: update monitor logs"
          git push origin HEAD:main

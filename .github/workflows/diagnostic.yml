name: Diario Oficial Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Show network basics
        run: |
          echo "Runner: $(uname -a)"
          echo "Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Resolve host
        run: |
          python - <<'PY'
          import socket

          host = "diariooficial.vilavelha.es.gov.br"
          print("DNS lookup for:", host)
          try:
              print(socket.gethostbyname_ex(host))
          except Exception as exc:
              print("DNS_ERROR:", repr(exc))
          PY

      - name: HTTP probe with requests
        run: |
          python - <<'PY'
          import time
          import requests

          url = "https://diariooficial.vilavelha.es.gov.br/"
          for trust_env in (True, False):
              print(f"\nREQUEST trust_env={trust_env}")
              session = requests.Session()
              session.trust_env = trust_env
              session.headers.update({"User-Agent": "Mozilla/5.0"})
              start = time.time()
              try:
                  response = session.get(url, timeout=20, verify=False)
                  elapsed = time.time() - start
                  print("STATUS:", response.status_code)
                  print("ELAPSED:", round(elapsed, 2), "s")
                  print("FINAL_URL:", response.url)
                  print("CONTENT_TYPE:", response.headers.get("content-type"))
                  print("BODY_HEAD:", response.text[:180].replace("\n", " "))
              except Exception as exc:
                  elapsed = time.time() - start
                  print("ERROR:", type(exc).__name__, repr(exc))
                  print("ELAPSED:", round(elapsed, 2), "s")
          PY

      - name: HTTP probe with curl
        run: |
          curl -I -L --max-time 20 https://diariooficial.vilavelha.es.gov.br/ || true
